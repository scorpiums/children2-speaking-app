<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Children 2 – Scene Card Speaking Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1976d2">

  <style>
    :root {
      --primary: #1976d2;
      --primary-dark: #0d47a1;
      --accent: #ffca28;
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --border-radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,0.12);
      --text-main: #333;
      --text-muted: #666;
    }

    * { box-sizing: border-box; font-family: system-ui, sans-serif; }

    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text-main);
      display: flex; justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      max-width: 960px; width: 100%;
      margin: 20px; background: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    h1 { margin: 0 0 4px; font-size: 1.4rem; color: var(--primary-dark); }
    .subtitle { margin: 0 0 16px; font-size: 0.9rem; color: var(--text-muted); }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 24px;
    }

    @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }

    .scene-card {
      border-radius: var(--border-radius);
      background: #fafafa; padding: 12px;
      border: 1px solid #e0e0e0;
    }

    .scene-thumb-wrapper {
      position: relative; cursor: pointer;
      border-radius: 8px; overflow: hidden;
      border: 2px solid var(--primary);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .scene-thumb-wrapper:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .question-container {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; background: #f8fafc;
      padding: 12px; border-radius: 10px;
      border: 1px dashed #cbd5e1;
    }

    .question-text {
      font-size: 1.2rem; font-weight: 600;
      color: var(--primary); flex-grow: 1;
      transition: all 0.3s ease;
      filter: blur(5px); opacity: 0.3;
      user-select: none;
    }

    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }

    button {
      border-radius: 999px; border: none;
      padding: 8px 16px; font-size: 0.9rem;
      cursor: pointer; display: inline-flex;
      align-items: center; gap: 6px;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #eeeeee; color: #333; }
    .btn-accent { background: var(--accent); color: #333; }
    .btn-outline { background: transparent; border: 1px solid #ccc; }

    textarea {
      width: 100%; min-height: 80px;
      border-radius: 8px; border: 1px solid #ccc;
      padding: 10px; font-size: 1rem; margin-bottom: 10px;
    }

    .ai-feedback { margin-top: 10px; padding: 10px; border-radius: 8px; display: none; }
    .ai-feedback.ok { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .ai-feedback.error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

    .answers-panel { margin-top: 10px; background: #fff8e1; padding: 12px; border-radius: 8px; display: none; }

    .nav-row { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: none; justify-content: center; align-items: center; z-index: 2000;
    }
    .modal-content { max-width: 90vw; position: relative; }
    .modal-img { width: 100%; border-radius: 8px; }
    .modal-close { position: absolute; top: -40px; right: 0; color: white; background: none; font-size: 1.2rem; }

    #btnInfo { font-size: 1.5rem; float: right; transition: transform 0.2s; }
    #btnInfo:hover { transform: scale(1.2); }
  </style>
</head>

<body>
  <div class="app-container">
    <button id="btnInfo" title="Help" style="background:none; border:none; cursor:pointer; color:var(--primary);">ℹ️</button>
    <h1>Children 2 – Scene Card</h1>
    <p class="subtitle">Speaking Practice</p>

    <div class="layout">
      <div class="column-left">
        <div class="scene-card">
          <div class="scene-thumb-wrapper" id="sceneThumb">
            <img src="scene-classroom.png" alt="Scene" style="display: block; width: 100%;">
            <div style="position: absolute; bottom: 0; background: rgba(25,118,210,0.8); color: white; width: 100%; text-align: center; padding: 4px 0; font-size: 0.8rem; pointer-events: none;">
              🔍 Click to zoom
            </div>
          </div>
        </div>
      </div>

      <div class="instructions-and-game">
        <div class="question-header">
          <div class="question-number" id="questionNumber">Question 1/30</div>
          <div class="grammar-tag" id="grammarTag">Present Continuous</div>
        </div>

        <div class="question-container">
          <div class="question-text" id="questionText">Question content</div>
          <button id="btnShowText" style="background:white; border:1px solid var(--primary); border-radius:6px; color:var(--primary); cursor:pointer; font-size:0.7rem; white-space:nowrap;">👁️ Show</button>
        </div>

        <div class="btn-row">
          <button class="btn-primary" id="btnListen">🔊 Escuchar</button>
        </div>

        <textarea id="answerInput" placeholder="Write your answer here..."></textarea>

        <div class="btn-row">
          <button class="btn-secondary" id="btnMic">🎤 Voz</button>
          <button class="btn-accent" id="btnEvaluate">🤖 Evaluar</button>
          <button class="btn-outline" id="btnToggleAnswers">📖 Respuestas</button>
        </div>

        <div class="ai-feedback" id="aiFeedback"></div>

        <div class="answers-panel" id="answersPanel">
          <div style="font-weight:600; margin-bottom:5px;">Model Answers:</div>
          <div id="answersList"></div>
        </div>

        <div class="nav-row">
          <button class="btn-secondary" id="btnPrev">⬅️ Anterior</button>
          <div class="nav-info">Cambridge Style</div>
          <button class="btn-secondary" id="btnNext">Siguiente ➡️</button>
        </div>
      </div>
    </div>
  </div>

  <div id="infoModal" class="modal-backdrop">
    <div style="background:white; padding:24px; border-radius:12px; max-width:400px; position:relative;">
      <button id="closeInfo" style="position:absolute; top:10px; right:10px; background:none; font-size:1.5rem;">&times;</button>
      <h3>How to use</h3>
      <p>1. Listen to the question.<br>2. Answer using the microphone or typing.<br>3. Use AI to check your answer.</p>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">✕ Close</button>
      <img src="scene-classroom.png" class="modal-img">
    </div>
  </div>

  <script>
    const questions = [
      { id: 1, question: "What is the teacher doing?", grammar: "Present Continuous", answers: ["She is writing on the board.", "Writing."] },
      { id: 2, question: "How many flowers are in the vase?", grammar: "Numbers", answers: ["There are four flowers.", "Four."] },
      { id: 3, question: "Where is the black handbag?", grammar: "Prepositions", answers: ["It is on the desk.", "On the table."] },
      { id: 4, question: "What color is the boy’s shirt?", grammar: "Colours", answers: ["It's green.", "He is wearing a green shirt."] },
      { id: 5, question: "What is the girl doing?", grammar: "Present Continuous", answers: ["She is writing.", "She's sitting and writing."] },
      { id: 6, question: "Where is the red backpack?", grammar: "Prepositions", answers: ["On the floor.", "Next to the girl."] },
      { id: 7, question: "What color is the teacher's hair?", grammar: "Physical description", answers: ["Orange.", "Her hair is orange."] },
      { id: 8, question: "Where is the tennis racket?", grammar: "Prepositions", answers: ["Next to the door.", "On the floor."] },
      { id: 9, question: "What letters can you see on the board?", grammar: "Alphabet", answers: ["A, B, C, D.", "The alphabet."] },
      { id: 10, question: "Is the teacher wearing glasses?", grammar: "Yes/No", answers: ["Yes, she is.", "Yes."] },
      { id: 11, question: "How many children are there?", grammar: "Numbers", answers: ["Two children.", "A boy and a girl."] },
      { id: 12, question: "What color is the rug on the floor?", grammar: "Colours", answers: ["It's pink.", "Pink and blue."] },
      { id: 13, question: "Where is the green pencil?", grammar: "Prepositions", answers: ["On the desk.", "Next to the bag."] },
      { id: 14, question: "What color are the girl’s shoes?", grammar: "Colours", answers: ["Black.", "They are black."] },
      { id: 15, question: "Is the boy reading or writing?", grammar: "Present Continuous", answers: ["He is reading.", "Reading a book."] },
      { id: 16, question: "Is the door open or closed?", grammar: "Adjectives", answers: ["It is closed.", "Closed."] },
      { id: 17, question: "What is on the teacher’s desk?", grammar: "Vocabulary", answers: ["A vase and a bag.", "Flowers."] },
      { id: 18, question: "What is the girl writing?", grammar: "Present Continuous", answers: ["In her notebook.", "Writing a text."] },
      { id: 19, question: "What color is the teacher’s dress?", grammar: "Colours", answers: ["Green.", "A green dress."] },
      { id: 20, question: "Where are the books?", grammar: "Prepositions", answers: ["On the shelf.", "Behind the children."] },
      { id: 21, question: "What is the boy looking at?", grammar: "Present Continuous", answers: ["A book.", "He is reading."] },
      { id: 22, question: "Is the girl happy or sad?", grammar: "Adjectives", answers: ["She is happy.", "She's smiling."] },
      { id: 23, question: "What is the teacher writing?", grammar: "Present Continuous", answers: ["Letters.", "The alphabet."] },
      { id: 24, question: "What color is the boy’s hair?", grammar: "Description", answers: ["Brown.", "He has brown hair."] },
      { id: 25, question: "Where is the door?", grammar: "Prepositions", answers: ["Behind the teacher.", "On the right."] },
      { id: 26, question: "What is the girl wearing?", grammar: "Clothes", answers: ["A pink dress.", "Pink clothes."] },
      { id: 27, question: "Is the teacher standing or sitting?", grammar: "Present Continuous", answers: ["Standing.", "She's standing."] },
      { id: 28, question: "What can you see on the floor?", grammar: "Vocabulary", answers: ["A rug.", "A pink carpet."] },
      { id: 29, question: "What is the teacher holding?", grammar: "Present Continuous", answers: ["Chalk.", "A piece of chalk."] },
      { id: 30, question: "What are the children doing?", grammar: "Present Continuous", answers: ["They are studying.", "Reading and writing."] }
    ];

    let current = 0;

    // Elementos
    const questionNumber = document.getElementById("questionNumber");
    const grammarTag = document.getElementById("grammarTag");
    const questionText = document.getElementById("questionText");
    const btnShowText = document.getElementById("btnShowText");
    const answerInput = document.getElementById("answerInput");
    const aiFeedback = document.getElementById("aiFeedback");
    const answersPanel = document.getElementById("answersPanel");
    const answersList = document.getElementById("answersList");

    const btnNext = document.getElementById("btnNext");
    const btnPrev = document.getElementById("btnPrev");
    const btnListen = document.getElementById("btnListen");
    const btnMic = document.getElementById("btnMic");
    const btnEvaluate = document.getElementById("btnEvaluate");
    const btnToggleAnswers = document.getElementById("btnToggleAnswers");

    function loadQuestion() {
      const q = questions[current];
      questionNumber.textContent = `Question ${current + 1}/${questions.length}`;
      grammarTag.textContent = q.grammar;
      questionText.textContent = q.question;
      
      // Reset UI
      questionText.style.filter = "blur(5px)";
      questionText.style.opacity = "0.3";
      btnShowText.innerHTML = "👁️ Show";
      answerInput.value = "";
      aiFeedback.style.display = "none";
      answersPanel.style.display = "none";
    }

    // Inicializar
    loadQuestion();

    // Zoom Imagen
    document.getElementById("sceneThumb").onclick = () => document.getElementById("modalBackdrop").style.display = "flex";
    document.getElementById("modalClose").onclick = () => document.getElementById("modalBackdrop").style.display = "none";
    
    // Instrucciones
    document.getElementById("btnInfo").onclick = () => document.getElementById("infoModal").style.display = "flex";
    document.getElementById("closeInfo").onclick = () => document.getElementById("infoModal").style.display = "none";

    // Mostrar/Ocultar Texto
    btnShowText.onclick = () => {
      const isHidden = questionText.style.filter !== "none";
      questionText.style.filter = isHidden ? "none" : "blur(5px)";
      questionText.style.opacity = isHidden ? "1" : "0.3";
      btnShowText.innerHTML = isHidden ? "🙈 Hide" : "👁️ Show";
    };

    // Navegación
    btnNext.onclick = () => { if(current < questions.length-1){ current++; loadQuestion(); } };
    btnPrev.onclick = () => { if(current > 0){ current--; loadQuestion(); } };

    // Audio
    btnListen.onclick = () => {
      const utter = new SpeechSynthesisUtterance(questions[current].question);
      utter.lang = "en-US";
      window.speechSynthesis.speak(utter);
    };

    // Respuestas
    btnToggleAnswers.onclick = () => {
      if(answersPanel.style.display === "none") {
        answersList.innerHTML = "";
        questions[current].answers.forEach(a => {
          const div = document.createElement("div");
          div.style.display = "flex";
          div.style.justifyContent = "space-between";
          div.style.marginBottom = "5px";
          div.innerHTML = `<span>${a}</span><button onclick="speak('${a}')" style="padding:2px 5px; font-size:0.7rem;">🔊</button>`;
          answersList.appendChild(div);
        });
        answersPanel.style.display = "block";
      } else {
        answersPanel.style.display = "none";
      }
    };

    window.speak = (text) => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      window.speechSynthesis.speak(u);
    };

    // Micrófono
    btnMic.onclick = () => {
      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!Recognition) return alert("Browser not supported");
      const rec = new Recognition();
      rec.lang = "en-US";
      rec.onresult = (e) => { answerInput.value = e.results[0][0].transcript; };
      rec.start();
    };

    // Evaluar con IA
    btnEvaluate.onclick = async () => {
      const user = answerInput.value.trim();
      if(!user) return;
      aiFeedback.style.display = "block";
      aiFeedback.textContent = "Checking...";
      try {
        const res = await fetch("https://github.pabgartov.workers.dev/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: questions[current].question, answers: questions[current].answers, user })
        });
        const data = await res.json();
        aiFeedback.textContent = data.result;
        aiFeedback.className = "ai-feedback " + (data.result.includes("✔️") ? "ok" : "error");
      } catch (e) {
        aiFeedback.textContent = "Connection error";
      }
    };
  </script>
</body>
</html>
