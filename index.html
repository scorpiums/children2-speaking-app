<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cambridge Speaking Practice – Children 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#9c27b0">

  <style>
    :root {
      --header-grad: linear-gradient(135deg, #64b5f6 0%, #ce93d8 100%);
      --bg-light: #f1f7f9;
      --yellow-tag: #ffd54f;
      --purple-btn: #9c27b0;
      --blue-btn: #42a5f5;
      --green-btn: #4caf50;
      --text-dark: #2c3e50;
      --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

    body {
      margin: 0; padding: 0;
      background-color: var(--bg-light);
      color: var(--text-dark);
      display: flex; justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      max-width: 500px; width: 100%;
      background: white;
      /* Eliminado min-height 100vh para que sea compacto */
      display: flex; flex-direction: column;
      position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    .app-header {
      background: var(--header-grad);
      padding: 15px 20px;
      color: white;
      display: flex; align-items: center;
    }

    .header-thumb-container {
      position: relative;
      width: 90px; height: 68px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .header-thumb {
      width: 100%; height: 100%;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.8);
    }

    .mini-lupa {
      position: absolute; bottom: -2px; right: -2px;
      background: white; border-radius: 50%;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .header-text { flex-grow: 1; text-align: center; padding-right: 20px; }
    .header-text h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
    .header-text p { margin: 0; font-size: 0.8rem; opacity: 0.9; }

    .instruction-box {
      background: #e8f5e9;
      margin: 15px; padding: 15px;
      border-radius: 15px; border-left: 5px solid #81c784;
      font-size: 0.85rem; line-height: 1.4;
    }

    .status-row { padding: 0 15px; margin-bottom: 8px; }
    .tag-yellow {
      background: var(--yellow-tag);
      padding: 4px 12px; border-radius: 20px;
      font-weight: 700; font-size: 0.8rem; display: inline-block;
    }

    .listen-wrapper { padding: 0 15px 8px; }

    .question-card {
      background: white;
      margin: 0 15px; padding: 25px 20px;
      border-radius: 20px;
      border: 2px solid #e3f2fd;
      box-shadow: var(--card-shadow);
      text-align: center;
    }
    .question-text {
      font-size: 1.2rem; font-weight: 700; color: #37474f;
      filter: blur(6px); opacity: 0.3; transition: all 0.3s;
    }

    .show-hide-row {
      display: flex; justify-content: flex-end;
      padding: 5px 15px 10px;
    }
    .btn-show {
      background: #b39ddb; color: white;
      padding: 5px 15px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 700; border: none; cursor: pointer;
    }

    .input-section { padding: 0 15px; }
    .input-wrapper { display: flex; gap: 10px; align-items: stretch; margin-bottom: 12px; }
    textarea {
      flex-grow: 1; border: 2px solid #e0e0e0; border-radius: 15px;
      padding: 12px; font-size: 1rem; min-height: 50px; outline: none;
    }

    .action-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
    
    .btn-pill {
      border-radius: 30px; border: none;
      padding: 12px 15px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 8px;
      cursor: pointer; transition: transform 0.1s;
      color: white; font-size: 0.85rem;
    }
    
    .btn-equal { flex: 1; justify-content: center; }
    .btn-blue { background: var(--blue-btn); }
    .btn-purple { background: var(--purple-btn); }
    .btn-yellow { background: var(--yellow-tag); color: #5f4b00; }
    .btn-green { background: var(--green-btn); }
    .btn-grey { background: #eceff1; color: #546e7a; }

    /* Estilos del Pop-up (Modal de Feedback) */
    .modal-popup {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: none; justify-content: center; align-items: center;
      z-index: 2000; padding: 20px;
    }
    .popup-content {
      background: white; padding: 25px;
      border-radius: 25px; max-width: 400px; width: 100%;
      text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .popup-title { font-weight: 800; margin-bottom: 15px; color: var(--purple-btn); font-size: 1.1rem; }
    .popup-text { font-size: 1rem; line-height: 1.5; color: #444; margin-bottom: 20px; }

    .nav-footer { 
      padding: 0 15px 20px; 
      display: flex; justify-content: space-between; 
      margin-top: 5px; /* Acerca los botones de navegación */
    }

    /* Modales de Imagen */
    .modal-full { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
    .modal-img { max-width: 95%; border-radius: 10px; }
  </style>
</head>

<body>
  <div class="app-container">
    
    <header class="app-header">
      <div class="header-thumb-container" id="sceneThumb">
        <img src="scene-classroom.png" class="header-thumb" alt="Miniatura">
        <div class="mini-lupa">🔍</div>
      </div>
      <div class="header-text">
        <h1>Cambridge Speaking Practice</h1>
        <p>Children 2 – Scene Card</p>
      </div>
    </header>

    <div class="instruction-box">
      💡 <b>Cómo usar:</b> Pulsa 🔊 <i>Escuchar</i> para oír la pregunta. Escribe tu respuesta o usa el 🎤 <i>Micrófono</i>. Pulsa 🤖 <i>Corregir con IA</i> para evaluar.
    </div

    <div class="status-row">
      <div class="tag-yellow" id="questionNumber">Pregunta 1 / 30</div>
    </div>

    <div class="listen-wrapper">
      <button class="btn-pill btn-blue" id="btnListen">🔊 Escuchar Pregunta</button>
    </div>

    <div class="question-card" id="qCard">
      <div class="question-text" id="questionText">What is the teacher doing?</div>
    </div>

    <div class="show-hide-row">
      <button class="btn-show" id="btnShowText">SHOW</button>
    </div>

    <div class="input-section">
      <div class="input-wrapper">
        <textarea id="answerInput" placeholder="Escribe aquí tu respuesta..."></textarea>
        <button class="btn-pill btn-purple" id="btnMic">🎤</button>
      </div>

      <div class="action-row">
        <button class="btn-pill btn-purple btn-equal" id="btnEvaluate">🤖 Corregir con IA</button>
        <button class="btn-pill btn-yellow btn-equal" id="btnToggleAnswers">⭐ Ver respuestas</button>
      </div>
    </div>

    <footer class="nav-footer">
      <button class="btn-pill btn-grey" id="btnPrev">← Anterior</button>
      <button class="btn-pill btn-green" id="btnNext">Siguiente →</button>
    </footer>

  </div>

  <div id="feedbackPopup" class="modal-popup">
    <div class="popup-content">
      <div class="popup-title" id="popupTitle">Evaluación de la IA</div>
      <div class="popup-text" id="popupBody">Analizando...</div>
      <button class="btn-pill btn-purple" onclick="closePopup()" style="width: 100%; justify-content: center;">Cerrar</button>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-full">
    <img src="scene-classroom.png" class="modal-img">
  </div>

  <script>
    const questions = [
      { id: 1, question: "What is the teacher doing?", answers: ["She is writing on the board.", "She's writing.", "Writing on the board."] },
      { id: 2, question: "What is the boy reading?", answers: ["He is reading a book.", "A book."] }
      // Añadir aquí el resto de las 30 preguntas
    ];

    let current = 0;
    const qText = document.getElementById("questionText");
    const qNum = document.getElementById("questionNumber");
    const answerInput = document.getElementById("answerInput");
    const btnShow = document.getElementById("btnShowText");
    const popup = document.getElementById("feedbackPopup");
    const popupTitle = document.getElementById("popupTitle");
    const popupBody = document.getElementById("popupBody");

    function loadQuestion() {
      const q = questions[current];
      qNum.textContent = `Pregunta ${current + 1} / ${questions.length}`;
      qText.textContent = q.question;
      qText.style.filter = "blur(6px)";
      qText.style.opacity = "0.3";
      btnShow.textContent = "SHOW";
      answerInput.value = "";
    }

    function showPopup(title, body) {
      popupTitle.textContent = title;
      popupBody.innerHTML = body;
      popup.style.display = "flex";
    }

    function closePopup() {
      popup.style.display = "none";
    }

    // Corregir con IA mediante Worker
    document.getElementById("btnEvaluate").onclick = async () => {
      const userText = answerInput.value.trim();
      if (!userText) return alert("Escribe algo primero.");

      showPopup("Analizando...", "La IA está revisando tu respuesta, espera un momento...");

      try {
        const response = await fetch("https://github.pabgartov.workers.dev/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question: questions[current].question,
            answers: questions[current].answers,
            user: userText
          })
        });
        const data = await response.json();
        showPopup("Resultado IA", data.result || "No se pudo obtener corrección.");
      } catch (e) {
        showPopup("Error", "No se pudo conectar con el servicio de IA.");
      }
    };

    // Ver Respuestas en Pop-up
    document.getElementById("btnToggleAnswers").onclick = () => {
      const list = questions[current].answers.map(a => `• ${a}`).join('<br>');
      showPopup("Respuestas sugeridas", list);
    };

    // Navegación
    document.getElementById("btnNext").onclick = () => { if(current < questions.length-1) { current++; loadQuestion(); }};
    document.getElementById("btnPrev").onclick = () => { if(current > 0) { current--; loadQuestion(); }};

    // Voz
    document.getElementById("btnListen").onclick = () => {
      const msg = new SpeechSynthesisUtterance(questions[current].question);
      msg.lang = 'en-US';
      window.speechSynthesis.speak(msg);
    };

    // Micrófono
    document.getElementById("btnMic").onclick = () => {
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'en-US';
      recognition.start();
      recognition.onresult = (e) => { answerInput.value = e.results[0][0].transcript; };
    };

    btnShow.onclick = () => {
      if (qText.style.filter !== "none") {
        qText.style.filter = "none"; qText.style.opacity = "1"; btnShow.textContent = "HIDE";
      } else {
        qText.style.filter = "blur(6px)"; qText.style.opacity = "0.3"; btnShow.textContent = "SHOW";
      }
    };

    document.getElementById("sceneThumb").onclick = () => document.getElementById("modalBackdrop").style.display = "flex";
    document.getElementById("modalBackdrop").onclick = () => document.getElementById("modalBackdrop").style.display = "none";

    loadQuestion();
  </script>
</body>
  </html>
