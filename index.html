<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cambridge Speaking Practice – Children 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#9c27b0">

  <style>
    :root {
      --header-grad: linear-gradient(135deg, #64b5f6 0%, #ce93d8 100%);
      --bg-light: #f1f7f9;
      --yellow-tag: #ffd54f;
      --purple-btn: #9c27b0;
      --blue-btn: #42a5f5;
      --green-btn: #4caf50;
      --text-dark: #2c3e50;
      --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

    body {
      margin: 0; padding: 0;
      background-color: var(--bg-light);
      color: var(--text-dark);
      display: flex; justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      max-width: 500px; width: 100%;
      background: white;
      min-height: 100vh;
      display: flex; flex-direction: column;
      position: relative;
    }

    /* Cabecera con miniatura en lugar de estrella */
    .app-header {
      background: var(--header-grad);
      padding: 15px 20px;
      color: white;
      display: flex; align-items: center; gap: 15px;
    }

    .header-thumb-container {
      position: relative;
      width: 60px; height: 60px;
      cursor: pointer;
    }

    .header-thumb {
      width: 100%; height: 100%;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.8);
    }

    .mini-lupa {
      position: absolute;
      bottom: -2px; right: -2px;
      background: white;
      border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .header-text h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
    .header-text p { margin: 0; font-size: 0.8rem; opacity: 0.9; }

    /* Instrucciones (Recuadro verde arriba) */
    .instruction-box {
      background: #e8f5e9;
      margin: 15px; padding: 15px;
      border-radius: 15px; border-left: 5px solid #81c784;
      font-size: 0.85rem; line-height: 1.4;
    }

    /* Tags de Progreso */
    .status-row {
      display: flex; justify-content: space-between;
      padding: 0 15px; margin-bottom: 10px;
      align-items: center;
    }
    .tag-yellow {
      background: var(--yellow-tag);
      padding: 6px 15px; border-radius: 20px;
      font-weight: 700; font-size: 0.85rem;
    }
    .btn-show {
      background: #b39ddb; color: white;
      padding: 6px 15px; border-radius: 20px;
      font-size: 0.8rem; font-weight: 700; border: none; cursor: pointer;
    }

    /* Botón Escuchar (Encima de la pregunta) */
    .listen-wrapper { padding: 0 15px 10px; }

    /* Card de la Pregunta */
    .question-card {
      background: white;
      margin: 0 15px 20px; padding: 30px 20px;
      border-radius: 20px;
      border: 2px solid #e3f2fd;
      box-shadow: var(--card-shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .question-card::after {
      content: attr(data-number);
      position: absolute; right: 10px; bottom: -10px;
      font-size: 5rem; font-weight: 900; color: #f1f8fe;
      z-index: 0;
    }
    .question-text {
      font-size: 1.3rem; font-weight: 700;
      color: #37474f; position: relative; z-index: 1;
      filter: blur(6px); opacity: 0.3; transition: all 0.3s;
    }

    /* Input y Botones */
    .input-section { padding: 0 15px; }
    .input-label { font-size: 0.85rem; font-weight: 700; color: #546e7a; margin-bottom: 8px; display: block; }
    
    .input-wrapper { display: flex; gap: 10px; align-items: stretch; margin-bottom: 15px; }
    textarea {
      flex-grow: 1; border: 2px solid #e0e0e0; border-radius: 15px;
      padding: 12px; font-size: 1rem; min-height: 60px; outline: none;
    }

    .btn-pill {
      border-radius: 30px; border: none;
      padding: 10px 20px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 8px;
      cursor: pointer; transition: transform 0.1s;
      color: white; font-size: 0.85rem;
    }
    .btn-pill:active { transform: scale(0.95); }
    
    .btn-blue { background: var(--blue-btn); }
    .btn-purple { background: var(--purple-btn); }
    .btn-yellow { background: var(--yellow-tag); color: #5f4b00; }
    .btn-green { background: var(--green-btn); }
    .btn-grey { background: #eceff1; color: #546e7a; }

    .action-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }

    /* Feedback */
    .ai-feedback { margin: 10px 15px; padding: 12px; border-radius: 12px; display: none; font-size: 0.9rem; }
    .ai-feedback.ok { background: #e8f5e9; color: #2e7d32; }
    .ai-feedback.error { background: #ffebee; color: #c62828; }

    /* Navegación inferior */
    .nav-footer { margin-top: auto; padding: 20px 15px; display: flex; justify-content: space-between; }

    /* Modales y Paneles */
    .modal-full { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-img { max-width: 95%; border-radius: 10px; }
    .answers-panel { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); padding: 20px; display: none; z-index: 100; }
  </style>
</head>

<body>
  <div class="app-container">
    
    <header class="app-header">
      <div class="header-thumb-container" id="sceneThumb">
        <img src="scene-classroom.png" class="header-thumb" alt="Miniatura">
        <div class="mini-lupa">🔍</div>
      </div>
      <div class="header-text">
        <h1>Cambridge Speaking Practice</h1>
        <p>Children 2 – Scene Card</p>
      </div>
      <button id="btnInfo" style="margin-left:auto; background:none; border:none; color:white; font-size:1.4rem; cursor:pointer;">ℹ️</button>
    </header>

    <div class="instruction-box">
      💡 <b>Cómo usar:</b> Pulsa 🔊 <i>Escuchar</i> para oír la pregunta. Escribe tu respuesta o usa el 🎤 <i>Micrófono</i>. Pulsa 🤖 <i>Corregir con IA</i> para evaluar.
    </div>

    <div class="status-row">
      <div class="tag-yellow" id="questionNumber">Pregunta 1 / 30</div>
      <button class="btn-show" id="btnShowText">SHOW</button>
    </div>

    <div class="listen-wrapper">
      <button class="btn-pill btn-blue" id="btnListen">🔊 Escuchar</button>
    </div>

    <div class="question-card" id="qCard" data-number="01">
      <div class="question-text" id="questionText">What is the teacher doing?</div>
    </div>

    <div class="input-section">
      <label class="input-label">✏️ Escribe tu respuesta en inglés:</label>
      <div class="input-wrapper">
        <textarea id="answerInput" placeholder="Escribe aquí..."></textarea>
        <button class="btn-pill btn-purple" id="btnMic" style="padding: 15px;">
          <span style="font-size:1.2rem">🎤</span>
        </button>
      </div>

      <div class="action-row">
        <button class="btn-pill btn-purple" id="btnEvaluate" style="flex:1; justify-content:center;">🤖 Corregir con IA</button>
        <button class="btn-pill btn-yellow" id="btnToggleAnswers" style="flex:1; justify-content:center;">⭐ Ver respuestas</button>
      </div>
    </div>

    <div class="ai-feedback" id="aiFeedback"></div>

    <footer class="nav-footer">
      <button class="btn-pill btn-grey" id="btnPrev">← Anterior</button>
      <button class="btn-pill btn-green" id="btnNext">Siguiente →</button>
    </footer>

    <div class="answers-panel" id="answersPanel">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <b>Model Answers</b>
        <button onclick="document.getElementById('answersPanel').style.display='none'" style="border:none; background:none; font-weight:bold; color:var(--purple-btn)">CERRAR</button>
      </div>
      <div id="answersList"></div>
    </div>

  </div>

  <div id="modalBackdrop" class="modal-full">
    <img src="scene-classroom.png" class="modal-img">
  </div>

  <script>
    /* LÓGICA Y PREGUNTAS MANTENIDAS */
    const questions = [
      { id: 1, question: "What is the teacher doing?", answers: ["She is writing on the board.", "Writing."] },
      { id: 2, question: "How many flowers are in the vase?", answers: ["There are four flowers.", "Four."] },
      { id: 3, question: "Where is the black handbag?", answers: ["It is on the desk.", "On the table."] },
      { id: 4, question: "What color is the boy’s shirt?", answers: ["It's green.", "He is wearing a green shirt."] },
      { id: 5, question: "What is the girl doing?", answers: ["She is writing.", "She's sitting and writing."] },
      { id: 6, question: "Where is the red backpack?", answers: ["On the floor.", "Next to the girl."] },
      { id: 7, question: "What color is the teacher's hair?", answers: ["Orange.", "Her hair is orange."] },
      { id: 8, question: "Where is the tennis racket?", answers: ["Next to the door.", "On the floor."] },
      { id: 9, question: "What letters can you see on the board?", answers: ["A, B, C, D.", "The alphabet."] },
      { id: 10, question: "Is the teacher wearing glasses?", answers: ["Yes, she is.", "Yes."] },
      { id: 11, question: "How many children are there?", answers: ["Two children.", "A boy and a girl."] },
      { id: 12, question: "What color is the rug on the floor?", answers: ["It's pink.", "Pink and blue."] },
      { id: 13, question: "Where is the green pencil?", answers: ["On the desk.", "Next to the bag."] },
      { id: 14, question: "What color are the girl’s shoes?", answers: ["Black.", "They are black."] },
      { id: 15, question: "Is the boy reading or writing?", answers: ["He is reading.", "Reading a book."] },
      { id: 16, question: "Is the door open or closed?", answers: ["It is closed.", "Closed."] },
      { id: 17, question: "What is on the teacher’s desk?", answers: ["A vase and a bag.", "Flowers."] },
      { id: 18, question: "What is the girl writing?", answers: ["In her notebook.", "Writing a text."] },
      { id: 19, question: "What color is the teacher’s dress?", answers: ["Green.", "A green dress."] },
      { id: 20, question: "Where are the books?", answers: ["On the shelf.", "Behind the children."] },
      { id: 21, question: "What is the boy looking at?", answers: ["A book.", "He is reading."] },
      { id: 22, question: "Is the girl happy or sad?", answers: ["She is happy.", "She's smiling."] },
      { id: 23, question: "What is the teacher writing?", answers: ["Letters.", "The alphabet."] },
      { id: 24, question: "What color is the boy’s hair?", answers: ["Brown.", "He has brown hair."] },
      { id: 25, question: "Where is the door?", answers: ["Behind the teacher.", "On the right."] },
      { id: 26, question: "What is the girl wearing?", answers: ["A pink dress.", "Pink clothes."] },
      { id: 27, question: "Is the teacher standing or sitting?", answers: ["Standing.", "She's standing."] },
      { id: 28, question: "What can you see on the floor?", answers: ["A rug.", "A pink carpet."] },
      { id: 29, question: "What is the teacher holding?", answers: ["Chalk.", "A piece of chalk."] },
      { id: 30, question: "What are the children doing?", answers: ["They are studying.", "Reading and writing."] }
    ];

    let current = 0;
    const qText = document.getElementById("questionText");
    const qNum = document.getElementById("questionNumber");
    const qCard = document.getElementById("qCard");
    const answerInput = document.getElementById("answerInput");
    const aiFeedback = document.getElementById("aiFeedback");
    const btnShow = document.getElementById("btnShowText");

    function loadQuestion() {
      const q = questions[current];
      qNum.textContent = `Pregunta ${current + 1} / ${questions.length}`;
      qText.textContent = q.question;
      qCard.setAttribute('data-number', (current + 1).toString().padStart(2, '0'));
      qText.style.filter = "blur(6px)";
      qText.style.opacity = "0.3";
      btnShow.textContent = "SHOW";
      answerInput.value = "";
      aiFeedback.style.display = "none";
    }

    loadQuestion();

    // Mostrar/Ocultar Texto
    btnShow.onclick = () => {
      if (qText.style.filter !== "none") {
        qText.style.filter = "none"; qText.style.opacity = "1"; btnShow.textContent = "HIDE";
      } else {
        qText.style.filter = "blur(6px)"; qText.style.opacity = "0.3"; btnShow.textContent = "SHOW";
      }
    };

    // Navegación
    document.getElementById("btnNext").onclick = () => { if(current < questions.length-1){ current++; loadQuestion(); } };
    document.getElementById("btnPrev").onclick = () => { if(current > 0){ current--; loadQuestion(); } };

    // Audio
    document.getElementById("btnListen").onclick = () => {
      const u = new SpeechSynthesisUtterance(questions[current].question);
      u.lang = "en-US"; window.speechSynthesis.speak(u);
    };

    // Reconocimiento de Voz (Micrófono)
    document.getElementById("btnMic").onclick = () => {
      if (!("webkitSpeechRecognition" in window)) { alert("Navegador no compatible"); return; }
      const rec = new webkitSpeechRecognition();
      rec.lang = "en-US";
      rec.onresult = (event) => { answerInput.value = event.results[0][0].transcript; };
      rec.start();
    };

    // Corregir con IA
    document.getElementById("btnEvaluate").onclick = async () => {
      const user = answerInput.value.trim();
      if(!user) return;
      aiFeedback.style.display = "block"; aiFeedback.textContent = "Checking...";
      try {
        const res = await fetch("https://github.pabgartov.workers.dev/", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: questions[current].question, answers: questions[current].answers, user })
        });
        const data = await res.json();
        aiFeedback.textContent = data.result;
        aiFeedback.className = "ai-feedback " + (data.result.includes("✔️") ? "ok" : "error");
      } catch (e) { aiFeedback.textContent = "Error de conexión"; }
    };

    // Zoom Imagen
    document.getElementById("sceneThumb").onclick = () => document.getElementById("modalBackdrop").style.display = "flex";
    document.getElementById("modalBackdrop").onclick = () => document.getElementById("modalBackdrop").style.display = "none";

    // Ver Respuestas
    document.getElementById("btnToggleAnswers").onclick = () => {
      const list = document.getElementById("answersList");
      list.innerHTML = "";
      questions[current].answers.forEach(a => {
        const item = document.createElement("div");
        item.style.padding = "10px 0"; item.style.borderBottom = "1px solid #eee";
        item.innerHTML = `<span>${a}</span>`; list.appendChild(item);
      });
      document.getElementById("answersPanel").style.display = "block";
    };
  </script>
</body>
</html>
