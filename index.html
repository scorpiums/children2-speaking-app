<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cambridge Speaking Practice – Children 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#9c27b0">

  <style>
    :root {
      --header-grad: linear-gradient(135deg, #64b5f6 0%, #ce93d8 100%);
      --bg-light: #f1f7f9;
      --yellow-tag: #ffd54f;
      --purple-btn: #9c27b0;
      --blue-btn: #42a5f5;
      --green-btn: #4caf50;
      --text-dark: #2c3e50;
      --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

    body {
      margin: 0; padding: 0;
      background-color: var(--bg-light);
      color: var(--text-dark);
      display: flex; justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      max-width: 500px; width: 100%;
      background: white;
      min-height: 100vh;
      display: flex; flex-direction: column;
      position: relative;
    }

    .app-header {
      background: var(--header-grad);
      padding: 15px 20px;
      color: white;
      display: flex; align-items: center;
    }

    .header-thumb-container {
      position: relative;
      width: 90px; height: 68px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .header-thumb {
      width: 100%; height: 100%;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.8);
    }

    .mini-lupa {
      position: absolute; bottom: -2px; right: -2px;
      background: white; border-radius: 50%;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .header-text { flex-grow: 1; text-align: center; padding-right: 20px; }
    .header-text h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
    .header-text p { margin: 0; font-size: 0.8rem; opacity: 0.9; }

    .instruction-box {
      background: #e8f5e9;
      margin: 15px; padding: 15px;
      border-radius: 15px; border-left: 5px solid #81c784;
      font-size: 0.85rem; line-height: 1.4;
    }

    .status-row { padding: 0 15px; margin-bottom: 10px; }
    .tag-yellow {
      background: var(--yellow-tag);
      display: inline-block;
      padding: 6px 15px; border-radius: 20px;
      font-weight: 700; font-size: 0.85rem;
    }

    .listen-wrapper { padding: 0 15px 10px; }

    .question-card {
      background: white;
      margin: 0 15px 5px;
      padding: 30px 20px;
      border-radius: 20px;
      border: 2px solid #e3f2fd;
      box-shadow: var(--card-shadow);
      text-align: center;
      position: relative;
    }
    .question-text {
      font-size: 1.3rem; font-weight: 700; color: #37474f;
      filter: blur(6px); opacity: 0.3; transition: all 0.3s;
    }

    .show-hide-row {
      display: flex; justify-content: flex-end;
      padding: 0 15px 15px;
    }
    .btn-show {
      background: #b39ddb; color: white;
      padding: 6px 18px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 700; border: none; cursor: pointer;
    }

    .input-section { padding: 0 15px; }
    .input-wrapper { display: flex; gap: 10px; align-items: stretch; margin-bottom: 15px; }
    textarea {
      flex-grow: 1; border: 2px solid #e0e0e0; border-radius: 15px;
      padding: 12px; font-size: 1rem; min-height: 60px; outline: none;
    }

    .action-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    
    .btn-pill {
      border-radius: 30px; border: none;
      padding: 12px 15px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 8px;
      cursor: pointer; transition: transform 0.1s;
      color: white; font-size: 0.85rem;
    }
    
    .btn-equal { flex: 1; justify-content: center; }
    .btn-blue { background: var(--blue-btn); }
    .btn-purple { background: var(--purple-btn); }
    .btn-yellow { background: var(--yellow-tag); color: #5f4b00; }
    .btn-green { background: var(--green-btn); }
    .btn-grey { background: #eceff1; color: #546e7a; }

    /* Campo de respuesta IA corregido y ubicado */
    .ai-feedback { 
      margin: 10px 0; padding: 15px; 
      border-radius: 15px; display: none; 
      font-size: 1rem; line-height: 1.5;
      background: transparent;
      border: 1px dashed #cbd5e1;
      color: var(--text-dark); text-align: center;
      font-style: italic;
    }
    .ai-feedback.ok { border-color: #4caf50; color: #2e7d32; font-style: normal; }
    .ai-feedback.error { border-color: #f44336; color: #c62828; }

    .nav-footer { 
      margin-top: auto;
      padding: 10px 15px 20px; 
      display: flex; justify-content: space-between; 
    }

    .modal-full { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-img { max-width: 95%; border-radius: 10px; }
  </style>
</head>

<body>
  <div class="app-container">
    
    <header class="app-header">
      <div class="header-thumb-container" id="sceneThumb">
        <img src="scene-classroom.png" class="header-thumb" alt="Miniatura">
        <div class="mini-lupa">🔍</div>
      </div>
      <div class="header-text">
        <h1>Cambridge Speaking Practice</h1>
        <p>Children 2 – Scene Card</p>
      </div>
    </header>

    <div class="instruction-box">
      💡 <b>Cómo usar:</b> Pulsa 🔊 <i>Escuchar</i> para oír la pregunta. Escribe tu respuesta o usa el 🎤 <i>Micrófono</i>. Pulsa 🤖 <i>Corregir con IA</i> para evaluar.
    </div>

    <div class="status-row">
      <div class="tag-yellow" id="questionNumber">Pregunta 1 / 30</div>
    </div>

    <div class="listen-wrapper">
      <button class="btn-pill btn-blue" id="btnListen">🔊 Escuchar</button>
    </div>

    <div class="question-card">
      <div class="question-text" id="questionText">What is the teacher doing?</div>
    </div>

    <div class="show-hide-row">
      <button class="btn-show" id="btnShowText">SHOW</button>
    </div>

    <div class="input-section">
      <div class="input-wrapper">
        <textarea id="answerInput" placeholder="Escribe aquí tu respuesta en inglés..."></textarea>
        <button class="btn-pill btn-purple" id="btnMic" style="padding: 15px;">🎤</button>
      </div>

      <div class="action-row">
        <button class="btn-pill btn-purple btn-equal" id="btnEvaluate">🤖 Corregir con IA</button>
        <button class="btn-pill btn-yellow btn-equal" id="btnToggleAnswers">⭐ Ver respuestas</button>
      </div>

      <div class="ai-feedback" id="aiFeedback"></div>
    </div>

    <footer class="nav-footer">
      <button class="btn-pill btn-grey" id="btnPrev">← Anterior</button>
      <button class="btn-pill btn-green" id="btnNext">Siguiente →</button>
    </footer>

  </div>

  <div id="modalBackdrop" class="modal-full">
    <img src="scene-classroom.png" class="modal-img">
  </div>

  <script>
    const questions = [
      { id: 1, question: "What is the teacher doing?", answers: ["She is writing on the board.", "She's writing.", "Writing on the blackboard."] },
      { id: 2, question: "How many children are there?", answers: ["There are six children.", "Six."] },
      // ... rellena con tus 30 preguntas
    ];

    let current = 0;
    const qText = document.getElementById("questionText");
    const qNum = document.getElementById("questionNumber");
    const answerInput = document.getElementById("answerInput");
    const aiFeedback = document.getElementById("aiFeedback");
    const btnShow = document.getElementById("btnShowText");

    function updateUI() {
      const q = questions[current];
      qNum.textContent = `Pregunta ${current + 1} / ${questions.length}`;
      qText.textContent = q.question;
      qText.style.filter = "blur(6px)";
      qText.style.opacity = "0.3";
      btnShow.textContent = "SHOW";
      answerInput.value = "";
      aiFeedback.style.display = "none";
    }

    // --- FUNCIONALIDAD IA (WORKER CLOUDFLARE) ---
    document.getElementById("btnEvaluate").onclick = async () => {
      const userText = answerInput.value.trim();
      if (!userText) {
        alert("Por favor, escribe o dicta una respuesta primero.");
        return;
      }

      aiFeedback.innerHTML = "⌛ Analizando tu respuesta...";
      aiFeedback.className = "ai-feedback";
      aiFeedback.style.display = "block";

      try {
        const response = await fetch("https://github.pabgartov.workers.dev/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question: questions[current].question,
            answers: questions[current].answers,
            user: userText
          })
        });

        const data = await response.json();
        const resultText = data.result || "No se pudo obtener una evaluación.";
        
        aiFeedback.innerHTML = resultText;
        
        // Cambiar color según si es correcto o tiene correcciones
        if (resultText.includes("✔️") || resultText.toLowerCase().includes("muy bien")) {
          aiFeedback.className = "ai-feedback ok";
        } else {
          aiFeedback.className = "ai-feedback error";
        }
      } catch (err) {
        aiFeedback.innerHTML = "❌ Error al conectar con la IA: " + err.message;
        aiFeedback.className = "ai-feedback error";
      }
    };

    // --- MOSTRAR RESPUESTAS SUGERIDAS ---
    document.getElementById("btnToggleAnswers").onclick = () => {
      if (aiFeedback.style.display === "block") {
        aiFeedback.style.display = "none";
      } else {
        aiFeedback.innerHTML = `<b>Respuestas posibles:</b><br>• ${questions[current].answers.join('<br>• ')}`;
        aiFeedback.className = "ai-feedback";
        aiFeedback.style.display = "block";
      }
    };

    // --- NAVEGACIÓN ---
    document.getElementById("btnNext").onclick = () => {
      if (current < questions.length - 1) { current++; updateUI(); }
    };
    document.getElementById("btnPrev").onclick = () => {
      if (current > 0) { current--; updateUI(); }
    };

    // --- VOZ (ESCUCHAR) ---
    document.getElementById("btnListen").onclick = () => {
      const msg = new SpeechSynthesisUtterance(questions[current].question);
      msg.lang = 'en-US';
      window.speechSynthesis.speak(msg);
    };

    // --- MICRÓFONO ---
    document.getElementById("btnMic").onclick = () => {
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'en-US';
      recognition.start();
      aiFeedback.innerHTML = "🎤 Escuchando...";
      aiFeedback.style.display = "block";

      recognition.onresult = (event) => {
        answerInput.value = event.results[0][0].transcript;
        aiFeedback.style.display = "none";
      };
    };

    // --- UI AUXILIAR ---
    btnShow.onclick = () => {
      if (qText.style.filter !== "none") {
        qText.style.filter = "none"; qText.style.opacity = "1"; btnShow.textContent = "HIDE";
      } else {
        qText.style.filter = "blur(6px)"; qText.style.opacity = "0.3"; btnShow.textContent = "SHOW";
      }
    };

    document.getElementById("sceneThumb").onclick = () => document.getElementById("modalBackdrop").style.display = "flex";
    document.getElementById("modalBackdrop").onclick = () => document.getElementById("modalBackdrop").style.display = "none";

    // Inicializar
    updateUI();
  </script>
</body>
</html>
