<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Children 2 – Scene Card Speaking Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1976d2">

  <style>
    :root {
      --primary: #1976d2;
      --primary-dark: #0d47a1;
      --accent: #ffca28; /* Amarillo para el contador */
      --listen-blue: #42a5f5; /* Azul claro para el botón escuchar */
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --border-radius: 15px;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
      --text-main: #333;
      --text-muted: #666;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .app-container {
      max-width: 500px; /* Ajustado para móviles como en la captura */
      width: 100%;
      margin: 10px;
      background: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      padding: 20px;
      overflow: hidden;
    }

    /* Título y Cabecera */
    .header-pwa {
      background: linear-gradient(90deg, #64b5f6, #ba68c8);
      margin: -20px -20px 20px;
      padding: 15px;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-pwa h1 {
      margin: 0;
      font-size: 1.1rem;
    }

    /* DISEÑO DE PÍLDORAS (RESTAURADO) */
    .question-number {
      display: inline-block;
      background: var(--accent);
      color: #333;
      padding: 10px 25px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .btn-listen-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--listen-blue);
      color: white;
      padding: 12px 30px;
      border-radius: 50px;
      border: none;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
      transition: transform 0.2s;
    }

    .btn-listen-pill:active {
      transform: scale(0.95);
    }

    /* Card de la Pregunta */
    .question-card {
      background: white;
      border-radius: 20px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: inset 0 0 0 2px #e3f2fd, 0 10px 20px rgba(0,0,0,0.05);
      margin-bottom: 20px;
      position: relative;
    }

    .question-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a237e;
      filter: blur(8px);
      opacity: 0.2;
      transition: all 0.4s ease;
    }

    .btn-show-hide {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #d1c4e9;
      color: #5e35b1;
      border: none;
      border-radius: 10px;
      padding: 5px 12px;
      font-size: 0.8rem;
      font-weight: bold;
      cursor: pointer;
    }

    /* Área de respuesta */
    .input-group {
      margin-top: 20px;
    }

    textarea {
      width: 100%;
      border: 2px solid #e0e0e0;
      border-radius: 15px;
      padding: 15px;
      font-size: 1rem;
      min-height: 80px;
      margin-bottom: 10px;
      outline: none;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn-action {
      flex: 1;
      padding: 12px;
      border-radius: 50px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn-evaluate { background: #9c27b0; color: white; }
    .btn-responses { background: var(--accent); color: #333; }
    .btn-mic { background: #9c27b0; color: white; border-radius: 50%; width: 50px; height: 50px; flex: none; }

    /* Navegación inferior */
    .nav-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .btn-nav {
      padding: 10px 25px;
      border-radius: 50px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-prev { background: #eceff1; color: #546e7a; }
    .btn-next { background: #4caf50; color: white; }

    /* Feedback */
    .ai-feedback {
      background: #fdf2f2;
      border: 1px dashed #f44336;
      border-radius: 15px;
      padding: 15px;
      margin-top: 10px;
      display: none;
    }

    .ai-feedback.ok {
      background: #f1f8e9;
      border-color: #4caf50;
      color: #2e7d32;
    }

    /* Imagen */
    .scene-box {
      background: #263238;
      border-radius: 15px;
      padding: 10px;
      color: white;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .scene-thumb {
      width: 60px;
      height: 45px;
      border-radius: 5px;
      object-fit: cover;
    }

  </style>
</head>
<body>

<div class="app-container">
  <div class="header-pwa">
    <span>⭐</span>
    <h1>Cambridge Speaking Practice<br><small>Children 2 – Scene Card</small></h1>
  </div>

  <div class="scene-box" id="sceneThumb" style="cursor:pointer;">
    <img src="scene-classroom.png" class="scene-thumb" alt="Escena">
    <div style="flex-grow:1;">
      <div style="color: var(--accent); font-weight: bold; font-size: 0.9rem;">🖼️ Scene Card</div>
      <div style="font-size: 0.75rem;">Tap to zoom in and explore</div>
    </div>
    <span style="font-size: 1.2rem;">🔍</span>
  </div>

  <div id="questionNumber" class="question-number">Pregunta 1 / 30</div>
  
  <br>
  
  <button id="btnListen" class="btn-listen-pill">
    🔊 Escuchar
  </button>

  <div class="question-card">
    <button class="btn-show-hide" id="btnShowText">SHOW</button>
    <div class="question-text" id="questionText">What is the teacher doing?</div>
  </div>

  <div class="input-group">
    <div style="font-size: 0.85rem; margin-bottom: 5px; color: #546e7a;">✏️ Escribe tu respuesta en inglés:</div>
    <div style="display: flex; gap: 10px; align-items: flex-start;">
      <textarea id="answerInput" placeholder="Escribe aquí..."></textarea>
      <button class="btn-mic" id="btnMic">🎤</button>
    </div>
  </div>

  <div class="action-buttons">
    <button class="btn-action btn-evaluate" id="btnEvaluate">🤖 Corregir con IA</button>
    <button class="btn-action btn-responses" id="btnToggleAnswers">⭐ Ver respuestas</button>
  </div>

  <div class="ai-feedback" id="aiFeedback"></div>

  <div class="nav-footer">
    <button class="btn-nav btn-prev" id="btnPrev">← Anterior</button>
    <button class="btn-nav btn-next" id="btnNext">Siguiente →</button>
  </div>
</div>

<script>
  // Lógica de navegación y estados
  const questions = [
    { id: 1, question: "What is the teacher doing?", answers: ["She is writing."] },
    { id: 2, question: "How many flowers are in the vase?", answers: ["There are four."] },
    // ... el resto de tus 30 preguntas se mantienen igual
  ];

  let current = 0;

  function loadQuestion() {
    const q = questions[current];
    document.getElementById("questionNumber").textContent = `Pregunta ${current + 1} / ${questions.length}`;
    document.getElementById("questionText").textContent = q.question;
    document.getElementById("questionText").style.filter = "blur(8px)";
    document.getElementById("questionText").style.opacity = "0.2";
    document.getElementById("btnShowText").textContent = "SHOW";
    document.getElementById("answerInput").value = "";
    document.getElementById("aiFeedback").style.display = "none";
  }

  document.getElementById("btnNext").onclick = () => {
    if (current < questions.length - 1) { current++; loadQuestion(); }
  };

  document.getElementById("btnPrev").onclick = () => {
    if (current > 0) { current--; loadQuestion(); }
  };

  document.getElementById("btnShowText").onclick = function() {
    const txt = document.getElementById("questionText");
    if (txt.style.filter === "none") {
      txt.style.filter = "blur(8px)";
      txt.style.opacity = "0.2";
      this.textContent = "SHOW";
    } else {
      txt.style.filter = "none";
      txt.style.opacity = "1";
      this.textContent = "HIDE";
    }
  };

  document.getElementById("btnListen").onclick = () => {
    const utter = new SpeechSynthesisUtterance(questions[current].question);
    utter.lang = "en-US";
    speechSynthesis.speak(utter);
  };
</script>

</body>
      </html>
